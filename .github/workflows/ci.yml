name: CI

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.0'
        cache: true
        
    - name: Install Task
      run: |
        sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
        
    - name: Format check
      run: task fmt:check

    - name: Template sync check
      run: task sync:check
      
    - name: Lint
      run: task lint
      
    - name: Test
      run: task test
      
    - name: Build
      run: task build
