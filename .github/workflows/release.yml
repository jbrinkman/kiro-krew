name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for auto-detection)'
        required: false
        default: ''

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.0'
        
    - name: Install Task
      run: |
        sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
        
    - name: Determine next version
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          # Auto-detect version based on current version
          CURRENT_VERSION=$(jq -r '.version' internal/version/version.json)
          # Simple increment for now - can be enhanced with semantic-release
          NEXT_VERSION=$(echo $CURRENT_VERSION | awk -F. '{$NF = $NF + 1;} 1' | sed 's/ /./g')
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
        fi
        
    - name: Set version
      run: task version:set VERSION=${{ steps.version.outputs.version }}
      
    - name: Build release artifacts
      run: task build:release
      
    - name: Create release and upload assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: Release v${{ steps.version.outputs.version }}
        body: |
          Release v${{ steps.version.outputs.version }}
          
          ## Changes
          Auto-generated release from GitHub Actions.
        draft: false
        prerelease: false
        files: |
          ./dist/release/kiro-krew-macos-arm64
