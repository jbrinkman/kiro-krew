name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (leave empty for semantic-release)'
        required: false
        default: ''

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    permissions:
      contents: write
      issues: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25.0'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Task
      run: |
        sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin

    - name: Install dependencies
      run: npm ci
        
    - name: Manual version release
      if: ${{ github.event.inputs.version != '' }}
      run: |
        VERSION=${{ github.event.inputs.version }}
        echo "Manual release: $VERSION"
        task version:set VERSION=$VERSION
        task build:release
        
        gh release create v$VERSION \
          --title "Release v$VERSION" \
          --notes "Manual release v$VERSION" \
          ./dist/release/kiro-krew#"kiro-krew macOS ARM64"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Semantic release
      if: ${{ github.event.inputs.version == '' }}
      run: npx semantic-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
