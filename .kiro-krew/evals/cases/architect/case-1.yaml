name: basic-spec-generation
description: "Evaluate architect's ability to create a basic specification from an issue"
agent: architect
input: |
  Create a specification for GitHub issue #42: "Add status command to TUI"
  
  The issue requests a simple status command that shows active agents.
setup:
  - type: file
    label: "Issue Body"
    content: "file://.kiro-krew/evals/fixtures/status-command-issue.md"
  - type: text
    label: "Project Context"
    content: "This is a Go project using BubbleTea for terminal UI. Commands are handled in internal/tui/commands.go"
context:
  - "Architect should create a specification file"
  - "Spec should include implementation tasks"
  - "Tasks should reference specific Go files"
  - "Should follow established project patterns"
expected_output: |
  A specification that includes:
  - Clear problem statement
  - Implementation tasks for internal/tui/commands.go
  - Task for updating internal/tui/tui.go
  - Table formatting requirements
  - File modification list