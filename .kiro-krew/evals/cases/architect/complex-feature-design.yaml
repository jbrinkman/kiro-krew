name: complex-feature-design
description: "Evaluate architect's handling of multi-component features"
agent: architect
input: |
  Design the architecture for implementing user authentication with JWT tokens.
  This involves database changes, API endpoints, and middleware.
setup:
  - type: file
    label: "Feature Specification"
    path: ".kiro-krew/evals/fixtures/sample-spec.md"
  - type: file
    label: "Codebase Structure"
    path: ".kiro-krew/evals/fixtures/codebase-context.md"
context:
  - "Should break down into logical implementation phases"
  - "Database changes should be identified"
  - "Security considerations should be addressed"
  - "API design should be RESTful"
expected_output: |
  Architecture covering:
  - Database schema design
  - Package structure for internal/auth
  - Middleware implementation plan
  - API endpoint definitions
  - Security considerations (bcrypt, JWT validation)
  - Integration points with existing code
