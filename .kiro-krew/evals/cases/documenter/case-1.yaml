output: |
  # Feature: Status Command

  ## Overview

  The `status` command displays all currently active kiro-krew agents in a formatted table, showing which issues are being worked on and how long each agent has been running.

  ## What Was Built

  A new TUI command that queries the agent manager and renders a table with columns for issue number, title, current status, and elapsed time. When no agents are running, it displays a friendly "No agents running" message.

  ## Technical Implementation

  - `internal/tui/commands.go` — `handleStatus()` function queries `manager.List()` and formats results using `fmt.Sprintf` with fixed-width columns
  - `internal/tui/tui.go` — `status` case added to `executeCommand` switch

  ## Usage

  From the kiro-krew TUI prompt:

  ```
  kiro-krew> status
  Issue    Title                          Status     Elapsed
  ──────────────────────────────────────────────────────────────────────
  42       Add JWT authentication         running    2m30s
  15       Fix memory leak                running    45s
  ```

  When no agents are active:

  ```
  kiro-krew> status
  No agents running
  ```

  Written to: `app_docs/feature-status-command.md`
