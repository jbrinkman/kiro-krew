name: configuration-reference
description: "Test documenter's creation of comprehensive configuration documentation"
agent: documenter
input: |
  Create complete configuration reference documentation for .kiro-krew/config.yaml
  including all options, examples, and environment variable overrides.
setup:
  - type: text
    label: "Configuration Options"
    content: "repo, label, poll_interval, max_retries with validation rules and defaults"
  - type: text
    label: "Environment Support"
    content: "KIRO_KREW_* environment variables override YAML values"
context:
  - "Should be a complete reference for all configuration options"
  - "Include examples for common use cases"
  - "Explain validation rules and error messages"
  - "Document environment variable precedence clearly"
expected_output: |
  Configuration reference with:
  - Complete option listing with types, defaults, and descriptions
  - Validation rules and acceptable value ranges
  - Environment variable override documentation
  - Configuration examples for different use cases
  - Common configuration mistakes and how to avoid them
