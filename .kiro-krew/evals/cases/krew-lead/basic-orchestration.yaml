name: basic-orchestration
description: "Test krew-lead's ability to orchestrate the standard workflow"
agent: krew-lead
input: |
  Process GitHub issue #42: "Add status command to TUI"
  
  Orchestrate the full workflow: setup worktree, run architect, builder, validator, create PR.
setup:
  - type: file
    label: "Issue Details"
    path: ".kiro-krew/evals/fixtures/status-command-issue.md"
  - type: text
    label: "Worktree Name"
    content: "issue-42-12345"
  - type: text
    label: "Repository"
    content: "jbrinkman/kiro-krew"
context:
  - "Should create git worktree for isolation"
  - "Must delegate to architect for spec generation"
  - "Should invoke builder with architect's spec"
  - "Validator should verify the implementation"
  - "PR should be created on successful completion"
expected_output: |
  Orchestration plan including:
  - Worktree creation and branch setup
  - Sequential agent delegation (architect → builder → validator)
  - Error handling for agent failures
  - PR creation with proper title and description
  - Cleanup of resources on completion or failure
