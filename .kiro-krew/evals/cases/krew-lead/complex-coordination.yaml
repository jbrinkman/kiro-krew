name: complex-coordination
description: "Test krew-lead's coordination of multi-phase implementation"
agent: krew-lead
input: |
  Coordinate implementation of user authentication feature that requires multiple
  phases: database setup, API implementation, middleware, and testing.
setup:
  - type: file
    label: "Complex Specification"
    path: ".kiro-krew/evals/fixtures/sample-spec.md"
  - type: text
    label: "Phase Dependencies"
    content: "Database schema → Auth package → API handlers → Middleware → Integration tests"
context:
  - "Implementation has clear phase dependencies"
  - "Each phase should be completed before the next begins"
  - "Builder should be given manageable chunks of work"
  - "Validation should occur at key milestones"
expected_output: |
  Multi-phase coordination plan with:
  - Break-down of spec into sequential implementation phases
  - Clear dependencies between phases
  - Builder task delegation with phase-specific instructions
  - Milestone validation points throughout implementation
  - Integration testing strategy for the complete feature
