name: plan-feature-request
description: "Evaluate planner output for structuring a feature request"
input: |
  Add user authentication with JWT tokens to the API.
  Users should be able to login and access protected endpoints.
output: |
  I've created the issue. Here's what was submitted:

  **Title:** feat: add JWT authentication to API

  **Body:**

  ## Problem Statement

  The API currently has no authentication mechanism. All endpoints are publicly accessible, which prevents us from building user-specific features or protecting sensitive operations.

  ## User Story

  As an API consumer, I want to authenticate with JWT tokens so that I can access protected endpoints and have my identity verified for user-specific operations.

  ## Acceptance Criteria

  - [ ] POST /auth/login accepts email/password and returns a JWT token
  - [ ] Protected endpoints return 401 when no valid token is provided
  - [ ] Tokens expire after a configurable duration (default: 24h)
  - [ ] A middleware function validates tokens and attaches user context to requests
  - [ ] Invalid or expired tokens return 401 with a descriptive error message

  ## Constraints

  - Use standard `golang-jwt/jwt/v5` library
  - Store user credentials with bcrypt hashing
  - Token secret must be configurable via environment variable
  - Do not introduce a database migration in this PR — use existing user store

  ## Context

  - Current router: `internal/api/router.go`
  - Existing user model: `internal/models/user.go`
  - Config loading: `internal/config/config.go`
