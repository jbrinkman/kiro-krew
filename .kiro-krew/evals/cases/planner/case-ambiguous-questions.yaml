name: ambiguous-question-detection
description: "Test that planner asks focused clarifying questions for vague inputs instead of multiple questions or assumptions"
input: |
  User wants to add some functionality to improve the system but isn't sure what exactly they need. They mentioned something about making it better and more efficient but didn't specify which part of the system or what kind of efficiency they're looking for.
output: |
  I'd like to help you plan this improvement. Let me start by understanding the scope.

  What specific part of the system are you looking to improve?
  a) Performance (response times, throughput)
  b) User experience (UI, workflows)
  c) Developer workflow (build times, tooling)
  d) Other (please specify)
