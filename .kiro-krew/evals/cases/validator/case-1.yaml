name: basic-functionality-verification
description: "Test validator's ability to verify basic feature implementation"
agent: validator
input: |
  Verify that the status command implementation meets the acceptance criteria:
  - Command responds to "status" input
  - Shows table with Issue | Agent | Status | Elapsed columns
  - Handles empty agent list gracefully
  - Code compiles without errors
setup:
  - type: text
    label: "Implementation Location"
    content: "Status command added to internal/tui/commands.go with handleStatus() method"
  - type: text
    label: "Expected Behavior"
    content: "Should display active agents in table format, show 'No agents running' when empty"
context:
  - "Validator should test actual functionality, not just code review"
  - "Should verify user-facing behavior matches requirements"
  - "Compilation and basic smoke testing required"
  - "Edge cases like empty state should be validated"
expected_output: |
  Validation report including:
  - Functional testing of the status command
  - Verification of table formatting and columns
  - Empty state handling confirmation
  - Compilation success verification
  - Any discrepancies from acceptance criteria