name: integration-testing
description: "Test validator's end-to-end integration testing approach"
agent: validator
input: |
  Validate the complete GitHub issue workflow integration: issue detection,
  agent spawning, spec generation, implementation, and PR creation.
setup:
  - type: text
    label: "Workflow Components"
    content: "Watcher → Krew-Lead → Architect → Builder → Validator → PR creation"
  - type: text
    label: "Test Environment"
    content: "Mock GitHub issue with kiro-krew label, isolated test repository"
context:
  - "Should test the complete end-to-end workflow"
  - "All components should integrate properly"
  - "Error propagation and retry logic should work"
  - "Final PR should contain expected changes"
expected_output: |
  Integration test results including:
  - End-to-end workflow execution verification
  - Component integration point validation
  - Error handling and retry mechanism testing
  - Final output quality assessment (PR content, code changes)
  - Identification of any integration issues or gaps