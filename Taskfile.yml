version: '3'

vars:
  BINARY_NAME: kiro-krew
  BUILD_DIR: ./dist
  VERSION_FILE: internal/version/version.json

tasks:
  update:
    desc: Switch to main, pull latest, and build
    cmds:
      - git checkout main
      - git pull
      - task: build

  build:
    desc: Build the application with version metadata
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -ldflags "-X github.com/jbrinkman/kiro-krew/internal/version.BuildDate={{.BUILD_TIME}} -X github.com/jbrinkman/kiro-krew/internal/version.CommitHash={{.COMMIT_HASH}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/kiro-krew
    vars:
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
      COMMIT_HASH:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "dev"

  test:
    desc: Run all tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  dev:
    desc: Development build (faster, no optimization)
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/kiro-krew

  lint:
    desc: Run linters and static analysis
    cmds:
      - go vet ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  fmt:check:
    desc: Check code formatting (fails if unformatted)
    cmds:
      - test -z "$(gofmt -l .)"

  sync:check:
    desc: Verify template-synchronized files match their live counterparts
    cmds:
      - |
        sync_error=0

        # Check agent files (JSON configs and prompt files)
        for file in .kiro/agents/*.json .kiro/agents/*.md; do
          if [ -f "$file" ]; then
            template_file="cmd/kiro-krew/templates/kiro/agents/$(basename "$file")"
            if [ -f "$template_file" ]; then
              if ! diff -q "$file" "$template_file" >/dev/null 2>&1; then
                echo "DESYNC: $file != $template_file"
                sync_error=1
              fi
            else
              echo "MISSING: $template_file (expected from $file)"
              sync_error=1
            fi
          fi
        done

        # Check scripts
        for file in .kiro-krew/scripts/*.sh; do
          if [ -f "$file" ]; then
            template_file="cmd/kiro-krew/templates/kiro-krew/scripts/$(basename "$file")"
            if [ -f "$template_file" ]; then
              if ! diff -q "$file" "$template_file" >/dev/null 2>&1; then
                echo "DESYNC: $file != $template_file"
                sync_error=1
              fi
            else
              echo "MISSING: $template_file (expected from $file)"
              sync_error=1
            fi
          fi
        done

        # Check themes
        for file in .kiro-krew/themes/*.yaml; do
          if [ -f "$file" ]; then
            template_file="cmd/kiro-krew/templates/kiro-krew/themes/$(basename "$file")"
            if [ -f "$template_file" ]; then
              if ! diff -q "$file" "$template_file" >/dev/null 2>&1; then
                echo "DESYNC: $file != $template_file"
                sync_error=1
              fi
            else
              echo "MISSING: $template_file (expected from $file)"
              sync_error=1
            fi
          fi
        done

        # Check eval fixtures
        for file in .kiro-krew/evals/fixtures/*; do
          if [ -f "$file" ]; then
            template_file="cmd/kiro-krew/templates/kiro-krew/evals/fixtures/$(basename "$file")"
            if [ -f "$template_file" ]; then
              if ! diff -q "$file" "$template_file" >/dev/null 2>&1; then
                echo "DESYNC: $file != $template_file"
                sync_error=1
              fi
            else
              echo "MISSING: $template_file (expected from $file)"
              sync_error=1
            fi
          fi
        done

        # Check eval rubrics
        for file in .kiro-krew/evals/rubrics/*; do
          if [ -f "$file" ]; then
            template_file="cmd/kiro-krew/templates/kiro-krew/evals/rubrics/$(basename "$file")"
            if [ -f "$template_file" ]; then
              if ! diff -q "$file" "$template_file" >/dev/null 2>&1; then
                echo "DESYNC: $file != $template_file"
                sync_error=1
              fi
            else
              echo "MISSING: $template_file (expected from $file)"
              sync_error=1
            fi
          fi
        done

        # Check eval cases (recursive)
        if [ -d ".kiro-krew/evals/cases" ]; then
          while IFS= read -r file; do
            relative_path="${file#.kiro-krew/evals/cases/}"
            template_file="cmd/kiro-krew/templates/kiro-krew/evals/cases/$relative_path"
            if [ -f "$template_file" ]; then
              if ! diff -q "$file" "$template_file" >/dev/null 2>&1; then
                echo "DESYNC: $file != $template_file"
                sync_error=1
              fi
            else
              echo "MISSING: $template_file (expected from $file)"
              sync_error=1
            fi
          done < <(find .kiro-krew/evals/cases -type f)
        fi

        if [ $sync_error -eq 0 ]; then
          echo "✅ All template-synchronized files match"
        else
          echo ""
          echo "❌ Template sync check failed"
          echo "Run the sync commands from .kiro/skills/builder-conventions/SKILL.md to fix."
          exit 1
        fi

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f {{.BINARY_NAME}}
      - rm -f coverage.out coverage.html

  version:update:
    desc: Update version number in version.json
    prompt: This will update the version number. Continue?
    cmds:
      - |
        echo "Current version: $(jq -r '.version' {{.VERSION_FILE}} 2>/dev/null || echo 'dev')"
        read -p "Enter new version: " NEW_VERSION
        if command -v jq >/dev/null 2>&1; then
          jq --arg version "$NEW_VERSION" '.version = $version' {{.VERSION_FILE}} > {{.VERSION_FILE}}.tmp
          mv {{.VERSION_FILE}}.tmp {{.VERSION_FILE}}
          echo "Updated to version: $NEW_VERSION"
        else
          echo "Error: jq is required for version updates"
          exit 1
        fi

  version:set:
    desc: Set new version number
    requires:
      vars: [VERSION]
    cmds:
      - |
        BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
        jq --arg version "{{.VERSION}}" \
           --arg timestamp "$BUILD_TIME" \
           --arg hash "$COMMIT_HASH" \
           '.version = $version | .build_timestamp = $timestamp | .commit_hash = $hash' \
           {{.VERSION_FILE}} > {{.VERSION_FILE}}.tmp
        mv {{.VERSION_FILE}}.tmp {{.VERSION_FILE}}
        echo "Updated to version: {{.VERSION}}"

  build:release:
    desc: Build release artifacts for all platforms
    cmds:
      - mkdir -p {{.BUILD_DIR}}/release
      - task: build:macos
      - task: build:linux:amd64
      - task: build:linux:arm64

  build:macos:
    desc: Build for macOS arm64
    cmds:
      - GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w -X github.com/jbrinkman/kiro-krew/internal/version.BuildDate={{.BUILD_TIME}}" -o {{.BUILD_DIR}}/release/kiro-krew ./cmd/kiro-krew
    vars:
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ

  build:linux:amd64:
    desc: Build for Linux amd64
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-s -w -X github.com/jbrinkman/kiro-krew/internal/version.BuildDate={{.BUILD_TIME}}" -o {{.BUILD_DIR}}/release/kiro-krew-linux-amd64 ./cmd/kiro-krew
    vars:
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ

  build:linux:arm64:
    desc: Build for Linux arm64
    cmds:
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X github.com/jbrinkman/kiro-krew/internal/version.BuildDate={{.BUILD_TIME}}" -o {{.BUILD_DIR}}/release/kiro-krew-linux-arm64 ./cmd/kiro-krew
    vars:
      BUILD_TIME:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
