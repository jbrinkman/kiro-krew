  - "Spec must include comprehensive validation logic"
  - "Should reference appropriate Go files and patterns"
expected_output: |
  A detailed specification that includes:
  - Comprehensive problem analysis
  - Detailed implementation tasks
  - Error handling requirements
  - Validation test cases