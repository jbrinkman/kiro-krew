name: custom-threshold-test
description: "Test case with custom 90% success threshold"
agent: architect
min_score: 90.0
input: |
  Create a specification for GitHub issue #99: "Add high-quality validation feature"
  
  This should have a very high quality bar requiring 90% score to pass.
setup:
