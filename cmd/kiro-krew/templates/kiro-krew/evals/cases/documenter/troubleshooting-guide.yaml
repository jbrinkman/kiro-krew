name: troubleshooting-guide
description: "Test documenter's creation of troubleshooting and FAQ content"
agent: documenter
input: |
  Create a troubleshooting guide for common GitHub integration issues.
  Focus on practical problem-solving with actionable solutions.
setup:
  - type: text
    label: "Common Issues"
    content: "GitHub auth failures, rate limiting, network timeouts, permission errors, webhook setup problems"
  - type: text
    label: "User Context"
    content: "Users setting up kiro-krew for the first time, encountering integration problems"
context:
  - "Should provide step-by-step diagnostic procedures"
  - "Include both symptoms and solutions"
  - "Cover prevention strategies where applicable"
  - "Use clear, non-technical language when possible"
expected_output: |
  Troubleshooting guide containing:
  - Structured problem categories with clear symptoms
  - Step-by-step diagnostic procedures for each issue type
  - Specific solutions with command examples
  - Prevention strategies and best practices
  - When to seek additional support or report bugs
