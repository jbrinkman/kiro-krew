name: orchestrate-issue-resolution
description: "Evaluate krew-lead output for processing a GitHub issue end-to-end"
input: |
  Process issue #42 from owner/my-repo. Worktree name: issue-42-12345

  The issue requests adding a `status` command to display active agents.
output: |
  ## Workflow Execution Log

  [attempt:1]

  ### Step 1: Read Issue
  Ran: `gh issue view 42 --repo owner/my-repo --json title,body,labels`
  Result: Retrieved issue "Add status command to display active agents"

  ### Step 2: Create Worktree
  Ran: `.kiro-krew/scripts/worktree-create.sh issue-42-12345`
  Result: Created worktree at .worktrees/issue-42-12345 on branch spec/issue-42-12345

  ### Step 3: Delegate to Architect
  Spawned architect agent with:
  - Issue details: title, body, acceptance criteria
  - WORKTREE_PATH: .worktrees/issue-42-12345
  Result: Spec created at .worktrees/issue-42-12345/.kiro-krew/specs/issue-42-status-command.md

  ### Step 4: Delegate to Builder
  Spawned builder agent with:
  - Spec file path
  - WORKTREE_PATH: .worktrees/issue-42-12345
  Result: Implementation complete, 2 files modified

  ### Step 5: Delegate to Validator
  Spawned validator agent with:
  - Issue acceptance criteria
  - WORKTREE_PATH: .worktrees/issue-42-12345
  Result: ✅ PASS — all acceptance criteria met

  ### Step 6: Push Branch
  Ran: `cd .worktrees/issue-42-12345 && git add -A && git commit -m "feat: add status command" && git push -u origin spec/issue-42-12345`
  Result: Branch pushed successfully

  ### Step 7: Create PR
  Ran: `gh pr create --repo owner/my-repo --head spec/issue-42-12345 --title "Add status command" --body "Closes #42"`
  Result: PR #43 created

  ### Step 8: Label Done
  Ran: `gh issue edit 42 --repo owner/my-repo --add-label kiro-krew-done`
  Result: Label applied
